<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct Messages — AgriLinker</title>
  
  <!-- Remix Icons CDN -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  
  <!-- Custom Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 1fr;
      height: calc(100vh - 180px);
      min-height: 500px;
      gap: 1.5rem;
      margin-top: 1rem;
    }
    
    @media(min-width: 768px) {
      .chat-layout {
        grid-template-columns: 1fr 2fr;
      }
    }

    /* Threads Sidebar */
    .threads-sidebar {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--card-bg);
      height: 100%;
    }

    .threads-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--card-border);
      font-weight: 700;
      font-size: 1.2rem;
    }

    .threads-list {
      flex: 1;
      overflow-y: auto;
    }

    .thread-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      transition: var(--transition);
    }

    .thread-item:hover, .thread-item.active {
      background: rgba(124, 194, 67, 0.08);
    }

    .thread-item.active {
      border-left: 4px solid var(--lime);
    }

    .thread-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 1.1rem;
    }

    .thread-details {
      flex: 1;
      min-width: 0;
    }

    .thread-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thread-preview {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Chat Area */
    .chat-window {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--card-bg);
      height: 100%;
    }

    .chat-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255,255,255,0.01);
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg-bubble {
      max-width: 70%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.95rem;
      position: relative;
      line-height: 1.4;
    }

    .msg-sent {
      align-self: flex-end;
      background: var(--primary-gradient);
      color: white;
      border-bottom-right-radius: 2px;
    }

    .msg-received {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      border-bottom-left-radius: 2px;
    }

    .msg-time {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 0.25rem;
      text-align: right;
    }

    .msg-received .msg-time {
      color: var(--text-muted);
    }

    .chat-footer {
      padding: 1.25rem;
      border-top: 1px solid var(--card-border);
      background: rgba(255,255,255,0.01);
    }

    .chat-input-wrapper {
      display: flex;
      gap: 1rem;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="brand-link">
        <i class="ri-leaf-line"></i>
        <span data-translate="brand">AgriLinker</span>
      </a>
      <nav id="main-nav">
        <!-- Managed dynamically -->
      </nav>
      <div class="lang-selector-container">
        <select class="lang-select" id="lang-select" aria-label="Select Language">
          <option value="en">English</option>
          <option value="hi">हिन्दी (Hindi)</option>
          <option value="ta">தமிழ் (Tamil)</option>
          <option value="te">తెలుగు (Telugu)</option>
          <option value="kn">ಕನ್ನಡ (Kannada)</option>
          <option value="ml">മലയാളം (Malayalam)</option>
          <option value="mr">मराठी (Marathi)</option>
          <option value="gu">ગુજરાતી (Gujarati)</option>
          <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
          <option value="bn">বাংলা (Bengali)</option>
        </select>
      </div>
    </div>
  </header>

  <main>
    <h2 data-translate="messages">Direct Messages</h2>
    <p style="color:var(--text-secondary); margin-bottom:1rem;">Chat directly with farmers or buyers to coordinate orders.</p>
    
    <div class="chat-layout">
      
      <!-- Thread lists -->
      <aside class="threads-sidebar">
        <div class="threads-header" data-translate="messages">Recent Chats</div>
        <div class="threads-list" id="threads-container">
          <!-- Rendered dynamically -->
        </div>
      </aside>

      <!-- Active Chat Window -->
      <section class="chat-window" id="active-chat-window">
        <!-- Thread Header -->
        <div class="chat-header" id="chat-header-details">
          <div class="thread-avatar" id="chat-header-avatar">-</div>
          <div>
            <h4 id="chat-header-name" style="font-weight:700;">Select a Conversation</h4>
            <p id="chat-header-role" style="font-size:0.8rem; color:var(--text-secondary);"></p>
          </div>
        </div>

        <!-- Chat messages content area -->
        <div class="chat-body" id="chat-messages-container">
          <div style="margin: auto; text-align: center; color: var(--text-muted);">
            <i class="ri-chat-3-line" style="font-size: 3rem; display: block; margin-bottom: 1rem;"></i>
            Select a contact from the list to start messaging.
          </div>
        </div>

        <!-- Message input bar -->
        <div class="chat-footer">
          <form id="chat-send-form">
            <div class="chat-input-wrapper">
              <input type="text" id="chat-input-field" class="form-control" placeholder="Type your message here..." data-translate="writeMessage" disabled required>
              <button type="submit" class="btn btn-primary" id="chat-send-btn" disabled data-translate="sendMessage">Send Message</button>
            </div>
          </form>
        </div>
      </section>

    </div>
  </main>

  <!-- App JS Scripts -->
  <script src="js/translations.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/messaging.js"></script>
</body>
</html>
